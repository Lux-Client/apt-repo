name: Build & Deploy APT Repository

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tools installieren
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Neueste .deb aus dem Lux-Release holen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p public/pool
          gh release download --repo Lux-Client/Lux-Client \
            --pattern '*.deb' --dir public/pool --clobber
          echo "Heruntergeladen:"; ls -la public/pool

      - name: GPG-Key importieren
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import
          echo "GPG_KEY_ID=${{ secrets.GPG_KEY_ID }}" >> "$GITHUB_ENV"
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

      - name: Repository bauen
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd public
          dpkg-scanpackages --multiversion . > Packages
          gzip -9 -k -f Packages

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Lux-Client" \
            -o APT::FTPArchive::Release::Label="Lux" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            release . > Release

          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release
          gpg --armor --export "$GPG_KEY_ID" > lux-archive-keyring.asc

          echo "apt.lux.pluginhub.de" > CNAME
          touch .nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
